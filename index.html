<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Muhammad Ashar — Redirecting…</title>
		<link rel="canonical" href="https://ashar-builds.netlify.app/" />
		<meta name="robots" content="noindex" />
		<!-- Instant client-side redirect -->
		<meta http-equiv="refresh" content="0; url=https://ashar-builds.netlify.app/" />
		<script>
			// Preserve the path/hash/query when redirecting (e.g. /projects -> netlify /projects)
			(function () {
				var base = 'https://ashar-builds.netlify.app';
				location.replace(base + location.pathname + location.search + location.hash);
			})();
		</script>
		<style>
			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				font-family: system-ui, sans-serif;
				background: #070711;
				color: #f1f5f9;
			}
			a {
				color: #818cf8;
			}
		</style>
	</head>
	<body>
		<p>
			This portfolio has moved.
			<a href="https://ashar-builds.netlify.app/">Continue to ashar-builds.netlify.app →</a>
		</p>
	</body>
</html>
